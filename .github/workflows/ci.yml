name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  emacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run ERT
        run: make test

      - name: Byte compile
        run: make compile

      - name: Run checkdoc
        run: make checkdoc

      - name: Install package-lint
        run: make package-lint-install PACKAGE_USER_DIR="$RUNNER_TEMP/elpa"

      - name: Run package-lint
        run: make package-lint PACKAGE_USER_DIR="$RUNNER_TEMP/elpa"
